name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Cache Elm home
        uses: actions/cache@v4
        with:
          path: ~/.elm
          key: elm-${{ hashFiles('**/elm.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Check Elm formatting
        run: npx elm-format --validate src/

      - name: Check HTML/JS formatting (Prettier)
        run: npx prettier --check index.html

      - name: Lint (elm-review)
        run: npx elm-review

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
